<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計簿</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>家計簿</h1>
  </header>

  <main>

    <!-- 残高サマリー -->
    <section class="card" id="section-summary">
      <h2>残高サマリー</h2>
      <div id="summary-list" class="summary-grid"></div>
    </section>

    <!-- 取引の記録 -->
    <section class="card" id="section-transaction">
      <h2>収支を記録する</h2>
      <div class="form-grid">
        <label>日付
          <input type="date" id="input-date">
        </label>
        <label>種類
          <select id="input-type">
            <option value="income">収入</option>
            <option value="expense">支出</option>
          </select>
        </label>
        <label>銀行口座
          <select id="input-bank-select">
            <option value="">-- 口座を選択 --</option>
          </select>
        </label>
        <label>金額（円）
          <input type="number" id="input-amount" placeholder="例：3000" min="1">
        </label>
        <label class="full-width">メモ
          <input type="text" id="input-memo" placeholder="例：スーパーで買い物">
        </label>
      </div>
      <button class="btn-primary" onclick="addTransaction()">記録する</button>
    </section>

    <!-- 銀行口座の管理 -->
    <section class="card" id="section-accounts">
      <h2>銀行口座</h2>
      <div class="form-row">
        <input type="text" id="input-bank-name" placeholder="銀行名（例：楽天銀行）">
        <input type="number" id="input-bank-balance" placeholder="初期残高（円）" min="0">
        <button onclick="addBank()">追加</button>
      </div>
      <ul id="bank-list"></ul>
      <button class="btn-bulk-delete" style="margin-top:12px;" onclick="deleteAllBanks()">全削除</button>
    </section>

    <!-- 取引履歴 -->
    <section class="card" id="section-history">
      <h2>取引履歴</h2>
      <div class="filter-row">
        <select id="filter-bank">
          <option value="">すべての口座</option>
        </select>
        <select id="filter-type">
          <option value="">収入・支出すべて</option>
          <option value="income">収入のみ</option>
          <option value="expense">支出のみ</option>
        </select>
        <button onclick="renderHistory()">絞り込み</button>
        <button class="btn-bulk-delete" onclick="bulkDeleteTransactions()">一括削除</button>
      </div>
      <table id="history-table">
        <thead>
          <tr>
            <th>日付</th>
            <th>種類</th>
            <th>銀行口座</th>
            <th>金額</th>
            <th>メモ</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
      <p id="no-history" class="empty-message">取引がありません</p>
    </section>

  </main>

  <!-- 取引編集モーダル -->
  <div id="edit-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>取引を編集</h3>
      <input type="hidden" id="edit-id">
      <div class="form-grid">
        <label>日付
          <input type="date" id="edit-date">
        </label>
        <label>種類
          <select id="edit-type">
            <option value="income">収入</option>
            <option value="expense">支出</option>
          </select>
        </label>
        <label>銀行口座
          <select id="edit-bank-select">
            <option value="">-- 口座を選択 --</option>
          </select>
        </label>
        <label>金額（円）
          <input type="number" id="edit-amount" min="1">
        </label>
        <label class="full-width">メモ
          <input type="text" id="edit-memo">
        </label>
      </div>
      <div class="modal-buttons">
        <button onclick="closeEditModal()">キャンセル</button>
        <button class="btn-primary" onclick="saveEditTransaction()">保存する</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
